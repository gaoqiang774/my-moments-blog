<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moments 博客后台管理</title>
    <style>
        :root {
            --primary: #1f3550;
            --primary-soft: #e4edf5;
            --bg: #f5f8fa;
            --border: #d9e1ea;
            --text: #243447;
            --muted: #6b7b8c;
            --panel: #ffffff;
            --success: #2d8a56;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(31, 53, 80, 0.08), transparent 28%),
                linear-gradient(180deg, #f8fbfd 0%, #eef3f7 100%);
        }

        .container {
            max-width: 1200px;
            min-height: calc(100vh - 40px);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(31, 53, 80, 0.08);
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(31, 53, 80, 0.08);
        }

        .sidebar {
            padding: 22px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .main {
            padding: 28px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .top-actions,
        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        h1,
        h2,
        h3,
        p {
            margin-top: 0;
        }

        h2 {
            margin-bottom: 0;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .helper {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 18px 0;
            overflow: auto;
            flex: 1;
        }

        .post-item {
            padding: 14px;
            border: 1px solid transparent;
            border-radius: 12px;
            background: #f9fbfd;
            cursor: pointer;
            transition: 0.2s ease;
            margin-bottom: 10px;
        }

        .post-item:hover {
            border-color: rgba(31, 53, 80, 0.12);
            background: #f2f7fb;
            transform: translateY(-1px);
        }

        .post-item.active {
            background: var(--primary-soft);
            border-color: rgba(31, 53, 80, 0.15);
        }

        .post-item-title {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .post-item-meta {
            font-size: 0.86rem;
            color: var(--muted);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.92rem;
            font-weight: 600;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font: inherit;
            color: var(--text);
            background: #fff;
        }

        textarea {
            resize: vertical;
        }

        .content-editor {
            min-height: 280px;
            font-family: Consolas, "Courier New", monospace;
            line-height: 1.6;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .input-grow {
            flex: 1;
        }

        .btn {
            border: none;
            border-radius: 999px;
            padding: 11px 16px;
            font: inherit;
            cursor: pointer;
            transition: 0.2s ease;
            background: var(--primary);
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(31, 53, 80, 0.18);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid rgba(31, 53, 80, 0.2);
            box-shadow: none;
        }

        .btn-soft {
            background: #5f7f95;
        }

        .btn-danger {
            background: #c63939;
        }

        .btn-danger:hover {
            box-shadow: 0 8px 18px rgba(198, 57, 57, 0.18);
        }

        .cover-preview {
            display: none;
            width: 100%;
            max-height: 220px;
            margin-top: 10px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(31, 53, 80, 0.08);
        }

        .editor-tip {
            margin-top: 8px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .empty-state {
            margin: 30px 0;
            text-align: center;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            display: none;
            background: var(--success);
            color: #fff;
            padding: 12px 18px;
            border-radius: 999px;
            box-shadow: 0 12px 26px rgba(45, 138, 86, 0.22);
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .input-row,
            .top-actions,
            .footer-actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="panel sidebar">
            <div class="top-actions">
                <div>
                    <h2>文章列表</h2>
                    <p class="helper">点击左侧文章即可编辑，右侧保存后会写回 data.json。</p>
                </div>
                <button type="button" class="btn btn-outline" onclick="createNewPost()">+ 新增</button>
            </div>

            <ul class="post-list" id="postList"></ul>
            <div id="emptyState" class="empty-state" style="display:none;">还没有文章，先创建第一篇吧。</div>

            <div class="footer-actions">
                <a href="/" target="_blank" rel="noreferrer" style="color: var(--primary); text-decoration: none;">预览博客首页</a>
                <a href="/journeys.html" target="_blank" rel="noreferrer" style="color: var(--primary); text-decoration: none;">预览旅程页</a>
            </div>
        </aside>

        <main class="panel main">
            <div style="margin-bottom: 18px;">
                <h2 id="formTitle">编辑文章</h2>
                <p class="helper">支持封面上传、正文 Markdown 编辑，以及内容图片插入。</p>
            </div>

            <form id="postForm">
                <input type="hidden" id="postId">

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="postTitle">标题</label>
                        <input type="text" id="postTitle" required placeholder="例如：海边玩沙的那个下午">
                    </div>

                    <div class="form-group">
                        <label for="postDate">日期 / 地点</label>
                        <input type="text" id="postDate" required placeholder="例如：2023 夏天 · 三亚">
                    </div>

                    <div class="form-group">
                        <label for="postCategory">分类</label>
                        <select id="postCategory">
                            <option value="moment">成长片段（首页）</option>
                            <option value="journey">游记（在路上）</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="postCoverImage">封面图片</label>
                        <div class="input-row">
                            <div class="input-grow">
                                <input type="text" id="postCoverImage" required placeholder="输入 ./images/xxx.jpg 或使用右侧上传">
                                <img id="coverPreview" class="cover-preview" alt="封面预览">
                            </div>
                            <button type="button" class="btn btn-soft" onclick="document.getElementById('coverUploadInput').click()">上传封面</button>
                            <input type="file" id="coverUploadInput" style="display:none;" accept="image/*" onchange="uploadImage(this, 'cover')">
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="postSummary">列表简介</label>
                        <textarea id="postSummary" rows="3" required placeholder="用一两句话概括这篇内容，会显示在列表卡片里。"></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label for="postContent">正文内容</label>
                        <div class="input-row" style="margin-bottom: 8px;">
                            <button type="button" class="btn btn-outline" onclick="document.getElementById('contentUploadInput').click()">插入正文图片</button>
                            <input type="file" id="contentUploadInput" style="display:none;" accept="image/*" onchange="uploadImage(this, 'content')">
                            <div class="editor-tip">光标放在正文框中，上传后会自动插入 Markdown 图片语法。</div>
                        </div>
                        <textarea id="postContent" class="content-editor" required placeholder="在这里写下完整的故事，支持基础 Markdown。"></textarea>
                    </div>
                </div>

                <div style="margin-top: 10px; display: flex; gap: 12px;">
                    <button type="button" class="btn" style="flex: 1; padding: 14px 16px;" onclick="savePost()">保存文章到本地</button>
                    <button type="button" id="deleteBtn" class="btn btn-danger" style="display: none; padding: 14px 16px;" onclick="deletePost()">删除此文章</button>
                </div>
            </form>
        </main>
    </div>

    <div id="toast" class="toast">保存成功</div>

    <script>
        let posts = [];

        function normalizeAssetUrl(url) {
            if (!url) {
                return "";
            }

            if (url.startsWith("./")) {
                return "/" + url.slice(2);
            }

            return url;
        }

        async function loadPosts() {
            const res = await fetch("/api/posts");
            if (!res.ok) {
                throw new Error("加载文章失败");
            }

            const data = await res.json();
            posts = Array.isArray(data.posts) ? data.posts : [];
            renderList();
        }

        function renderList() {
            const list = document.getElementById("postList");
            const emptyState = document.getElementById("emptyState");
            list.innerHTML = "";

            if (!posts.length) {
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";

            [...posts].reverse().forEach((post) => {
                const li = document.createElement("li");
                li.className = "post-item";

                if (document.getElementById("postId").value === String(post.id)) {
                    li.classList.add("active");
                }

                const categoryLabel = post.category === "journey" ? "游记" : "首页";
                li.innerHTML = `
                    <div class="post-item-title">${post.title || "未命名文章"}</div>
                    <div class="post-item-meta">${post.date || "未填写时间"} · ${categoryLabel}</div>
                `;
                li.onclick = () => loadPostToForm(post.id);
                list.appendChild(li);
            });
        }

        function loadPostToForm(id) {
            const post = posts.find((item) => String(item.id) === String(id));
            if (!post) {
                return;
            }

            document.getElementById("formTitle").innerText = "编辑文章";
            document.getElementById("postId").value = post.id || "";
            document.getElementById("postTitle").value = post.title || "";
            document.getElementById("postDate").value = post.date || "";
            document.getElementById("postCategory").value = post.category || "moment";
            document.getElementById("postCoverImage").value = post.coverImage || "";
            document.getElementById("postSummary").value = post.summary || "";
            document.getElementById("postContent").value = post.content || "";

            document.getElementById("deleteBtn").style.display = "block";

            updateCoverPreview();
            renderList();
        }

        function createNewPost() {
            document.getElementById("formTitle").innerText = "新增文章";
            document.getElementById("postForm").reset();
            document.getElementById("postId").value = "";
            document.getElementById("coverPreview").style.display = "none";
            document.getElementById("deleteBtn").style.display = "none";
            renderList();
        }

        async function uploadImage(inputElem, type) {
            const file = inputElem.files[0];
            if (!file) {
                return;
            }

            const formData = new FormData();
            formData.append("image", file);
            inputElem.value = "";

            try {
                const res = await fetch("/api/upload", {
                    method: "POST",
                    body: formData
                });

                if (!res.ok) {
                    throw new Error("上传失败");
                }

                const data = await res.json();
                if (!data.url) {
                    throw new Error("返回结果缺少图片地址");
                }

                if (type === "cover") {
                    document.getElementById("postCoverImage").value = data.url;
                    updateCoverPreview();
                    return;
                }

                const contentInput = document.getElementById("postContent");
                const insertText = `\n\n![图片描述](${data.url})\n\n`;
                const start = contentInput.selectionStart || 0;
                const end = contentInput.selectionEnd || 0;
                const text = contentInput.value;
                contentInput.value = text.slice(0, start) + insertText + text.slice(end);
                const cursor = start + insertText.length;
                contentInput.focus();
                contentInput.setSelectionRange(cursor, cursor);
            } catch (error) {
                console.error(error);
                alert("图片上传失败，请确认本地后台服务正在运行。");
            }
        }

        function updateCoverPreview() {
            const preview = document.getElementById("coverPreview");
            const rawUrl = document.getElementById("postCoverImage").value.trim();

            if (!rawUrl) {
                preview.style.display = "none";
                preview.removeAttribute("src");
                return;
            }

            preview.src = normalizeAssetUrl(rawUrl);
            preview.style.display = "block";
        }

        async function savePost() {
            const form = document.getElementById("postForm");
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const postData = {
                id: document.getElementById("postId").value || undefined,
                title: document.getElementById("postTitle").value.trim(),
                date: document.getElementById("postDate").value.trim(),
                category: document.getElementById("postCategory").value,
                coverImage: document.getElementById("postCoverImage").value.trim(),
                summary: document.getElementById("postSummary").value.trim(),
                content: document.getElementById("postContent").value
            };

            try {
                const res = await fetch("/api/posts", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(postData)
                });

                if (!res.ok) {
                    throw new Error("保存失败");
                }

                const data = await res.json();
                showToast("保存成功");
                await loadPosts();
                loadPostToForm(data.post.id);
            } catch (error) {
                console.error(error);
                alert("保存失败，请确认后台服务正常运行。");
            }
        }

        async function deletePost() {
            const id = document.getElementById("postId").value;
            if (!id) return;

            if (!confirm("确定要删除这篇文章吗？此操作不可撤销。")) {
                return;
            }

            try {
                const res = await fetch(`/api/posts/${id}`, {
                    method: "DELETE"
                });

                if (!res.ok) {
                    throw new Error("删除失败");
                }

                showToast("删除成功");
                await loadPosts();
                createNewPost();
            } catch (error) {
                console.error(error);
                alert("删除失败，请确认后台服务正常运行。");
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 2000);
        }

        document.getElementById("postCoverImage").addEventListener("input", updateCoverPreview);

        loadPosts().catch((error) => {
            console.error(error);
            alert("后台初始化失败，请检查服务是否已启动。");
        });
    </script>
</body>
</html>
